<div class="min-h-dvh bg-surface flex flex-col md:block">
  <!-- Overlay (mobile sidebar) -->
  @if (showOverlay()) {
    <div class="fixed inset-0 bg-black/20 z-40 md:hidden" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar (desktop only — hidden on mobile now) -->
  <app-sidebar [isOpen]="isSidebarOpen()" [isMobile]="isMobile()" (closeSidebar)="closeSidebar()"></app-sidebar>

  <!-- Main content -->
  <main #mainContent id="main-content" tabindex="-1" [attr.aria-label]="currentPageTitle()" class="md:pl-64 flex-1 md:h-dvh flex flex-col min-h-0 focus:outline-none">
    <router-outlet></router-outlet>
  </main>

  <!-- Screen reader route announcer -->
  <div class="sr-only" aria-live="assertive" aria-atomic="true">
    {{ routeAnnouncement() }}
  </div>

  <!-- Toast notifications -->
  <app-toast />

  <!-- Bottom tab bar (mobile only) -->
  <app-bottom-tab-bar class="sticky bottom-0 z-30" />
</div>
